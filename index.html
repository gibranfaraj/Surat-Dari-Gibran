<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* BACKGROUND BLUR */
.bg, .bg2 {
    position: absolute;
    width: 300px;
    height: 300px;
    filter: blur(120px);
    border-radius: 50%;
}

.bg {
    background: #ff4d6d;
    top: 10%;
    left: 20%;
}

.bg2 {
    background: #ffc2d1;
    bottom: 10%;
    right: 20%;
}

/* CARD */
.card {
    position: relative;
    padding: 40px;
    width: 300px;
    text-align: center;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    color: white;
    animation: fade 1s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* GAMBAR */
.card img {
    width: 130px;
    height: 130px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid white;
    margin-bottom: 15px;
    animation: naikTurun 3s ease-in-out infinite;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
@keyframes naikTurun {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    text-align: center;
}

/* BUTTON */
button {
    width: 108%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* LOVE */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-800px); opacity: 0;}
}
</style>

</head>
<body>

<div class="bg"></div>
<div class="bg2"></div>

<div class="card">
    <!-- GAMBAR LUCU -->
    <img src="fotoku.jpg" alt="Foto Aku">

    <h2>Masukin Nama Kamuu yaa<3 !</h2>
    <input type="text" id= "nama" placeholder="Nama kamu">
    <button onclick="lanjut()">
    Masuk 💖</button>
<script>
function lanjut(){
    let nama = document.getElementById("nama").value;

    if(nama.trim() === ""){
        alert("Isi dulu namanya dong 😒");
        return;
    }

    localStorage.setItem("namaUser", nama);
    window.location.href = "halaman2.html";
}
</script>
</div>
<script>
// LOVE BACKGROUND
setInterval(() => {
    const love = document.createElement("div");
    love.className = "heart";
    love.innerHTML = "💖";

    love.style.left = Math.random() * window.innerWidth + "px";
    love.style.bottom = "0px";

    document.body.appendChild(love);

    setTimeout(() => love.remove(), 6000);
}, 400);
</script>

</body>
</html>
