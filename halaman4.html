<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>I Love You 💖</title>
<style>
html,body{
    margin:0;
    height:100%;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}
canvas{
    display:block;
}

/* OVERLAY MULAI */
#overlay{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:20;
    transition:opacity 0.8s;
}
#overlay.hilang{
    opacity:0;
    pointer-events:none;
}
#btnMulai{
    padding:14px 28px;
    font-size:18px;
    font-family:'Poppins',sans-serif;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#ff8fa3,#ff4d6d);
    color:white;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,77,109,.6);
}

#pesanAkhir{
    position:fixed;
    left:50%;
    bottom:8%;
    transform:translateX(-50%);
    text-align:center;
    color:white;
    opacity:0;
    transition:2s;
    z-index:10;
    pointer-events:none;
    text-shadow:0 0 15px rgba(255,255,255,.5);
}

#pesanAkhir.muncul{
    opacity:1;
}

.love{
    font-size:32px;
    margin-bottom:10px;
}

.judul{
    font-size:22px;
    font-weight:600;
    margin-bottom:8px;
}

.isi{
    font-size:18px;
    opacity:.9;
}

.ttd{
    margin-top:10px;
    font-size:16px;
    opacity:.8;
    font-style:italic;
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>

<!-- OVERLAY TOMBOL MULAI -->
<div id="overlay">
    <button id="btnMulai">Tolong Diliat Sampai Akhir >-<💖</button>
</div>

<canvas id="c"></canvas>

<div id="pesanAkhir">
    <div class="love">💖</div>

    <div class="judul">
        Terima kasih sudah membuka sampai akhir.
    </div>

    <div class="isi">
        Semoga harimu selalu menyenangkan ✨
    </div>

    <div class="ttd">
        - Gibran
    </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const nama = localStorage.getItem("namaUser");
const teksUlang = "i love " + (nama ? nama.toLowerCase() : "you");

function buatTitikHati(jumlah){
    const titik = [];
    for(let i=0;i<jumlah;i++){
        const t = Math.random()*Math.PI*2;
        const r = 0.85 + Math.random()*0.4;

        let x = 16*Math.pow(Math.sin(t),3) * r;
        let y = -(13*Math.cos(t)
                - 5*Math.cos(2*t)
                - 2*Math.cos(3*t)
                - Math.cos(4*t)) * r;

        titik.push({x,y});
    }
    return titik;
}

const titikHati = buatTitikHati(300);

let kata = [];

function siapkanKata(){
    kata = [];

    const scale = Math.min(canvas.width, canvas.height) / 32;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    titikHati.forEach((p, idx)=>{
        kata.push({
            x: cx + p.x * scale,
            y: cy + p.y * scale,
            size: 11 + Math.random() * 9,
            opacity: 0,
            delay: idx * 195 + Math.random() * 800,
            hue: 330 + Math.random() * 30
        });
    });
}

siapkanKata();
window.addEventListener("resize", siapkanKata);

let mulai = null;

function gambar(timestamp){

    if(!mulai) mulai = timestamp;

    const lewat = timestamp - mulai;

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    kata.forEach(k=>{

        if(lewat > k.delay){
            k.opacity = Math.min(1, k.opacity + 0.01);
        }

        if(k.opacity > 0){

            ctx.font = k.size + "px monospace";
            ctx.textAlign = "center";

            ctx.fillStyle =
            `hsla(${k.hue},100%,55%,${k.opacity})`;

            ctx.shadowColor =
            `hsla(${k.hue},100%,60%,${k.opacity})`;

            ctx.shadowBlur = 8;

            ctx.fillText(
                teksUlang,
                k.x,
                k.y
            );
        }
    });

    requestAnimationFrame(gambar);
}

// klik tombol mulai -> sembunyikan overlay, play musik, mulai animasi
document.getElementById("btnMulai").addEventListener("click", ()=>{
    document.getElementById("overlay").classList.add("hilang");

    const music = document.getElementById("bgMusic");
    music.volume = 0.4;
    music.play().catch(()=>{
        console.log("Autoplay diblokir browser");
    });

    requestAnimationFrame(gambar);

    setTimeout(()=>{
        document
            .getElementById("pesanAkhir")
            .classList.add("muncul");
    },58000);
});
</script>

</body>
</html>
